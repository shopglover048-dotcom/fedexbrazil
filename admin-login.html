<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | FedEx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/styles.css" />
</head>
<body data-page="admin-login">
  <div class="noise" aria-hidden="true"></div>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand" aria-label="FedEx home">
        <img class="brand-logo-png" src="static/images/fedex-logo.png" alt="FedEx logo png" />
      </a>
      <nav>
        <a href="index.html">Home</a>
        <a href="ship.html">Ship Now</a>
        <a href="world-map.html">Live Map</a>
</nav>
</div>
  </header>

  <main>
    <div class="container flash-wrap" id="flash-container"></div>
    <section class="section">
      <div class="container narrow">
        <form class="panel" id="admin-login-form">
          <p class="eyebrow">Operations Access</p>
          <h2>Sign in to operations console</h2>
          <label>Username<input name="username" required /></label>
          <label>Password<input name="password" type="password" required /></label>
          <button type="submit" class="btn">Login</button>
          <p class="hint">Default credentials: <code>admin</code> / <code>admin</code>. Press <code>Ctrl + Shift + A</code> from any page to open this screen.</p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-wrap">
      <p>© 2026 FedEx Logistics</p>
      <p>Shipping, tracking, and delivery operations</p>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
